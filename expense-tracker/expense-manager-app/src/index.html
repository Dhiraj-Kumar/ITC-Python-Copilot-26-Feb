<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Manager</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 class="mt-5">Expense Manager</h1>
        <form id="expense-form" class="mt-4">
            <div class="form-group">
                <label for="expense-name">Expense Name</label>
                <input type="text" id="expense-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="expense-amount">Amount</label>
                <input type="number" id="expense-amount" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Add Expense</button>
        </form>

        <h2 class="mt-5">Expenses</h2>
        <ul id="expense-list" class="list-group mt-3"></ul>

        <h3 class="mt-5">Total Expenses: <span id="total-expenses">0</span></h3>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
