<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
        <!-- Minimal HTML and CSS for the attached login page design -->
    <div class="login-container">
      <form class="login-form">
        <h2>Login</h2>
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Type your username">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Type your password">
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        <button type="submit" class="login-btn">LOGIN</button>
        <div class="divider">Or Sign Up Using</div>
        <div class="social-icons">
          <a href="#"><span class="icon fb"></span></a>
          <a href="#"><span class="icon tw"></span></a>
          <a href="#"><span class="icon g"></span></a>
        </div>
        <div class="divider">Or Sign Up Using</div>
        <a href="#" class="signup-link">SIGN UP</a>
      </form>
    </div>
    
    <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a82fb 0%, #fc5c7d 100%);
      min-height: 100vh;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-form {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 40px 32px;
      width: 350px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-form h2 {
      margin-bottom: 32px;
      font-size: 2rem;
      font-weight: 600;
    }
    .input-group {
      width: 100%;
      margin-bottom: 24px;
      position: relative;
    }
    .input-group label {
      display: block;
      font-size: 1rem;
      margin-bottom: 6px;
      color: #333;
    }
    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-bottom: 2px solid #eee;
      font-size: 1rem;
      outline: none;
      background: transparent;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-bottom: 2px solid #6a82fb;
    }
    .forgot-password {
      position: absolute;
      right: 0;
      top: 36px;
      font-size: 0.9rem;
      color: #aaa;
      text-decoration: none;
    }
    .login-btn {
      width: 100%;
      padding: 12px 0;
      margin-top: 8px;
      border: none;
      border-radius: 24px;
      background: linear-gradient(90deg, #6a82fb 0%, #fc5c7d 100%);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: linear-gradient(90deg, #fc5c7d 0%, #6a82fb 100%);
    }
    .divider {
      margin: 24px 0 12px 0;
      color: #aaa;
      font-size: 0.95rem;
      text-align: center;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .icon {
      display: inline-block;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #eee;
      text-align: center;
      line-height: 40px;
      font-size: 1.5rem;
      transition: background 0.2s;
    }
    .icon.fb { background: #3b5998; color: #fff; }
    .icon.tw { background: #1da1f2; color: #fff; }
    .icon.g { background: #db4437; color: #fff; }
    .icon.fb::before { content: ""; font-family: Arial; }
    .icon.tw::before { content: ""; font-family: Arial; }
    .icon.g::before { content: "G"; font-family: Arial; }
    .signup-link {
      display: block;
      margin-top: 8px;
      color: #6a82fb;
      font-weight: 600;
      text-decoration: none;
      font-size: 1rem;
    }
    .signup-link:hover {
      text-decoration: underline;
    }
    </style>
</body>
</html>
