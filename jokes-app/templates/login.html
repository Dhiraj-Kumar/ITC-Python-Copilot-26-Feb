<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #43a4f7 0%, #7b5de3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 400px;
      max-width: 90vw;
      padding: 48px 40px 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-container h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 36px;
      margin-top: 0;
      color: #000;
      letter-spacing: 1px;
    }
    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .login-form label {
      font-size: 1rem;
      color: #888;
      margin-bottom: 8px;
    }
    .login-form input[type="email"],
    .login-form input[type="password"] {
      width: 100%;
      padding: 12px 0 8px 0;
      border: none;
      border-bottom: 2px solid #ccc;
      background: transparent;
      font-size: 1.1rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-form input[type="email"]:focus,
    .login-form input[type="password"]:focus {
      border-bottom: 2px solid #43a4f7;
    }
    .login-form input::placeholder {
      color: #bbb;
      font-size: 1.1rem;
    }
    .login-btn {
      width: 100%;
      padding: 14px 0;
      margin-top: 8px;
      background: linear-gradient(90deg, #43a4f7 0%, #7b5de3 100%);
      color: #fff;
      font-size: 1.2rem;
      font-weight: 500;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:hover {
      opacity: 0.92;
    }
    .login-links {
      width: 100%;
      text-align: center;
      margin-top: 28px;
      font-size: 1rem;
      color: #888;
    }
    .login-links a {
      color: #43a4f7;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .login-links a:hover {
      color: #7b5de3;
      text-decoration: underline;
    }
    .login-links .signup-link {
      color: #2d3a4a;
      font-weight: 700;
      margin-left: 4px;
    }
    @media (max-width: 500px) {
      .login-container {
        padding: 32px 12px 24px 12px;
        width: 98vw;
      }
      .login-container h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <h2>Login</h2>
    <form class="login-form" method="POST" action="/login">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="login-links" style="margin-top: 24px;">
      <div>
        Forgot <a href="#">Password?</a>
      </div>
      <div style="margin-top: 16px;">
        Don't have an account?
        <a href="#" class="signup-link">Sign up</a>
      </div>
    </div>
  </div>
</body>
</html>
