{% extends "base.html" %}

{% block title %}Home - Jokes App{% endblock %}

{% block content %}
<!-- Display the list of categories for jokes -->
<div class="container mt-5">
    <h1 class="mb-4">Joke Categories</h1>
    <div class="row">
        {% for category in categories %}
        <div class="col-md-4 mb-3">
            <div class="card h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center">
                    <h5 class="card-title">{{ category }}</h5>
                    <a href="{{ url_for('joke', category=category) }}" class="btn btn-primary mt-3">View Jokes</a>
                </div>
            </div>
        </div>
        {% endfor %}   
    </div>
</div>
{% endblock %}
